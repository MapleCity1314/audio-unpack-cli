name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_target: windows-x86_64-pc-windows-msvc
            binary_path: target/release/audio-unpack-cli.exe
          - os: ubuntu-latest
            artifact_target: linux-x86_64-unknown-linux-gnu
            binary_path: target/release/audio-unpack-cli
          - os: macos-latest
            artifact_target: macos-aarch64-apple-darwin
            binary_path: target/release/audio-unpack-cli

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Package archive
        run: python scripts/package_release.py --target ${{ matrix.artifact_target }} --binary ${{ matrix.binary_path }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_target }}
          path: dist/*.zip

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
